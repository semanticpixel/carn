name: Release

# Publishes to npm on a `v*.*.*` tag push. Uses npm's OIDC trusted-
# publisher flow — no NPM_TOKEN secret to rotate or leak; provenance
# attestation is automatic. Tagging happens locally
# (`pnpm version <bump>` creates the tag); the developer pushes it
# with `git push --tags`. The package must be pre-registered as a
# trusted publisher on npm (see CHANGELOG / PR description for the
# one-time setup).
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build

      # --provenance signs the publish with the GitHub OIDC token, which
      # npm validates against the trusted-publisher record on the package.
      # No NODE_AUTH_TOKEN env needed — the OIDC token is the auth.
      - run: pnpm publish --access public --provenance --no-git-checks
